packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

catalog:
  '@axe-core/playwright': 4.12.1
  '@eslint/js': 9.39.5
  '@playwright/test': 1.61.1
  '@tailwindcss/postcss': 4.3.2
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/react': 16.3.2
  '@testing-library/user-event': 14.6.1
  '@types/node': 22.20.1
  '@types/pg': 8.18.0
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@aws-sdk/client-s3': 3.1088.0
  drizzle-kit: 0.31.10
  drizzle-orm: 0.45.2
  eslint: 9.39.5
  eslint-config-next: 16.2.10
  globals: 17.7.0
  ioredis: 5.11.1
  jsdom: 28.1.0
  next: 16.2.10
  pg: 8.22.0
  pino: 10.3.1
  postcss: 8.5.8
  prettier: 3.9.5
  react: 19.2.7
  react-dom: 19.2.7
  tailwindcss: 4.3.2
  tsup: 8.5.1
  tsx: 4.23.1
  typescript: 5.9.3
  typescript-eslint: 8.64.0
  vitest: 4.1.10
  zod: 4.4.3

minimumReleaseAgeExclude:
  - '@aws-sdk/checksums@3.1000.18'
  - '@aws-sdk/client-s3@3.1088.0'
  - '@aws-sdk/core@3.975.3'
  - '@aws-sdk/credential-provider-env@3.972.59'
  - '@aws-sdk/credential-provider-http@3.972.61'
  - '@aws-sdk/credential-provider-ini@3.973.3'
  - '@aws-sdk/credential-provider-login@3.972.65'
  - '@aws-sdk/credential-provider-node@3.972.69'
  - '@aws-sdk/credential-provider-process@3.972.59'
  - '@aws-sdk/credential-provider-sso@3.973.3'
  - '@aws-sdk/credential-provider-web-identity@3.972.65'
  - '@aws-sdk/middleware-sdk-s3@3.972.64'
  - '@aws-sdk/nested-clients@3.997.33'
  - '@aws-sdk/signature-v4-multi-region@3.996.41'
  - '@aws-sdk/token-providers@3.1088.0'
  - '@aws-sdk/types@3.974.2'
  - '@aws-sdk/xml-builder@3.972.36'

settings:
  autoInstallPeers: true
  linkWorkspacePackages: true
  preferWorkspacePackages: true
  sharedWorkspaceLockfile: true
