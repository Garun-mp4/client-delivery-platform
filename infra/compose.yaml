name: garun-workspace-local

x-application-environment: &application-environment
  APP_ENV: local
  APP_NAME: ${APP_NAME:?Copy infra/.env.example to infra/.env}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:?Copy infra/.env.example to infra/.env}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: ${APP_DATABASE_URL:?Copy infra/.env.example to infra/.env}
  REDIS_URL: ${APP_REDIS_URL:?Copy infra/.env.example to infra/.env}
  BETTER_AUTH_SECRET: ${APP_BETTER_AUTH_SECRET:?Copy infra/.env.example to infra/.env}
  AUTH_COOKIE_PREFIX: ${AUTH_COOKIE_PREFIX:-garun}
  INVITATION_TTL_HOURS: ${INVITATION_TTL_HOURS:-72}
  MAGIC_LINK_TTL_SECONDS: ${MAGIC_LINK_TTL_SECONDS:-900}
  OUTBOX_ENCRYPTION_KEY: ${APP_OUTBOX_ENCRYPTION_KEY:?Copy infra/.env.example to infra/.env}
  FILE_MAX_BYTES: ${FILE_MAX_BYTES:-104857600}
  WORKSPACE_QUOTA_BYTES: ${WORKSPACE_QUOTA_BYTES:-10737418240}
  DELETED_FILE_GRACE_DAYS: ${DELETED_FILE_GRACE_DAYS:-30}
  TECHNICAL_LOG_RETENTION_DAYS: ${TECHNICAL_LOG_RETENTION_DAYS:-90}
  STORAGE_ENDPOINT: http://minio:9000
  STORAGE_PUBLIC_ENDPOINT: http://127.0.0.1:9000
  STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
  STORAGE_BUCKET: ${STORAGE_BUCKET:-garun-private}
  STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:?Copy infra/.env.example to infra/.env}
  STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Copy infra/.env.example to infra/.env}
  STORAGE_FORCE_PATH_STYLE: 'true'
  STORAGE_UPLOAD_TTL_SECONDS: ${STORAGE_UPLOAD_TTL_SECONDS:-900}
  STORAGE_DOWNLOAD_TTL_SECONDS: ${STORAGE_DOWNLOAD_TTL_SECONDS:-60}
  INCOMPLETE_UPLOAD_RETENTION_HOURS: ${INCOMPLETE_UPLOAD_RETENTION_HOURS:-24}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Copy infra/.env.example to infra/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy infra/.env.example to infra/.env}
      POSTGRES_USER: ${POSTGRES_USER:?Copy infra/.env.example to infra/.env}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.9-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--requirepass',
        '${REDIS_PASSWORD:?Copy infra/.env.example to infra/.env}',
      ]
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Copy infra/.env.example to infra/.env}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Copy infra/.env.example to infra/.env}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Copy infra/.env.example to infra/.env}
      MINIO_API_CORS_ALLOW_ORIGIN: ${STORAGE_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3100,http://127.0.0.1:3100}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: 500
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - '127.0.0.1:1025:1025'
      - '127.0.0.1:8025:8025'
    volumes:
      - mailpit_data:/data

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'clamdscan', '--ping', '1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - '127.0.0.1:3310:3310'
    volumes:
      - clamav_signatures:/var/lib/clamav

  migrate:
    image: garun-workspace-local-app:dev
    pull_policy: never
    build:
      context: ..
      dockerfile: infra/Dockerfile.local
    command: ['pnpm', 'db:migrate']
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:?Copy infra/.env.example to infra/.env}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  storage-init:
    image: garun-workspace-local-app:dev
    pull_policy: never
    command: ['pnpm', '--filter', '@garun/storage', 'storage:init']
    environment:
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?Copy infra/.env.example to infra/.env}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://127.0.0.1:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-garun-private}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:?Copy infra/.env.example to infra/.env}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Copy infra/.env.example to infra/.env}
      STORAGE_FORCE_PATH_STYLE: 'true'
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'

  web:
    image: garun-workspace-local-app:dev
    pull_policy: never
    command: ['pnpm', '--filter', '@garun/web', 'exec', 'next', 'dev', '--hostname', '0.0.0.0']
    environment: *application-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped

  worker:
    image: garun-workspace-local-app:dev
    pull_policy: never
    command: ['pnpm', '--filter', '@garun/worker', 'exec', 'tsx', 'watch', 'src/index.ts']
    environment:
      <<: *application-environment
      EMAIL_FROM: ${EMAIL_FROM:?Copy infra/.env.example to infra/.env}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      WORKER_HOST: 0.0.0.0
      WORKER_PORT: 3001
      SCANNER_HOST: clamav
      SCANNER_PORT: 3310
      SCANNER_REQUIRED: 'true'
    depends_on:
      mailpit:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    ports:
      - '127.0.0.1:3001:3001'
    restart: unless-stopped

volumes:
  clamav_signatures:
  mailpit_data:
  minio_data:
  postgres_data:
  redis_data:
